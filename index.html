<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>바른시선한의원 서류작성</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- 외부 라이브러리 (인터넷에서 자동으로 불러옵니다) -->
  <!-- 서명 그리기 -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <!-- PDF 생성 (직접 그리기) + 한글 폰트 심기 -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
  <!-- PDF → JPG 변환 (일부 양식을 그림파일로도 저장할 때 사용) -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/legacy/build/pdf.min.js"></script>
  <!-- 도로명 주소 검색 (카카오/다음 우편번호) -->
  <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
  <!-- 상단 바 -->
  <header class="topbar">
    <div class="topbar-title" id="topbarTitle">바른시선한의원</div>
    <div class="topbar-step" id="topbarStep"></div>
  </header>

  <!-- 화면들이 여기에 그려집니다 -->
  <main id="app"></main>

  <!-- 처리 중 표시 -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <div id="loadingText">처리 중입니다…</div>
  </div>

  <!-- 우리가 만든 코드 -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/signature.js"></script>
  <script src="js/document.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
