<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>아픈 곳 표시 - 샘플</title>
<style>
  :root{--brand:#2f6f8f;--line:#d3dde2;--text:#23323a;--text-soft:#5f7481;--danger:#c0392b;--bg:#f4f7f9;}
  *{box-sizing:border-box;}
  body{margin:0;padding:24px;background:var(--bg);color:var(--text);
    font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;}
  h1{font-size:18px;margin:0 0 4px;}
  .sub{color:var(--text-soft);font-size:13px;margin:0 0 18px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;max-width:820px;margin:0 auto;}
  .figs{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .fig{text-align:center;}
  .fig h3{font-size:13px;color:var(--text-soft);margin:0 0 6px;font-weight:600;}
  svg{display:block;touch-action:manipulation;cursor:crosshair;}
  .mark{fill:rgba(214,63,52,0.40);stroke:var(--danger);stroke-width:3;cursor:pointer;}
  .toolbar{margin-top:16px;border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:12px;}
  .count{font-size:13px;color:var(--text-soft);}
  .btn{padding:7px 14px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;cursor:pointer;color:var(--text-soft);}
</style>
</head>
<body>
<div class="card">
  <h1>아픈 곳을 표시해 주세요</h1>
  <p class="sub">그림에서 아픈 곳을 누르면 그 자리에 표시가 생깁니다. 표시를 다시 누르면 지워집니다.</p>
  <div class="figs">
    <div class="fig"><h3>앞면</h3><svg id="front" width="270" height="591" viewBox="0 0 599 1312"></svg></div>
    <div class="fig"><h3>뒷면</h3><svg id="back"  width="270" height="591" viewBox="0 0 600 1312"></svg></div>
  </div>
  <div class="toolbar">
    <span class="count" id="count">표시한 곳: 0</span>
    <button class="btn" id="undoBtn">되돌리기</button>
    <button class="btn" id="clearBtn">전체 지우기</button>
  </div>
</div>

<script>
const SVGNS="http://www.w3.org/2000/svg";
const IMG="/img/bodychart.png";
const R=30;              // 표시 반지름(뷰박스 단위)
const el=(n,a)=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};

// 표시 저장: [{view,x,y}] — 누른 순서대로
const marks=[];

function svgOf(view){return document.getElementById(view);}

function toLocal(svg,evt){
  const p=svg.createSVGPoint();p.x=evt.clientX;p.y=evt.clientY;
  return p.matrixTransform(svg.getScreenCTM().inverse());
}

function onSvgClick(view,evt){
  const svg=svgOf(view);
  const pt=toLocal(svg,evt);
  // 기존 표시 근처면 제거
  for(let i=marks.length-1;i>=0;i--){
    const m=marks[i];if(m.view!==view)continue;
    if(Math.hypot(m.x-pt.x,m.y-pt.y)<=R){marks.splice(i,1);render();return;}
  }
  marks.push({view,x:Math.round(pt.x),y:Math.round(pt.y)});
  render();
}

function build(view){
  const svg=svgOf(view);svg.innerHTML="";
  svg.appendChild(el("image",{href:IMG,x:view==="front"?0:-599,y:0,width:1199,height:1312}));
  svg.appendChild(el("g",{id:view+"-marks"}));
  svg.addEventListener("click",e=>onSvgClick(view,e));
}

function render(){
  ["front","back"].forEach(v=>{
    const g=document.getElementById(v+"-marks");g.innerHTML="";
    marks.filter(m=>m.view===v).forEach(m=>{
      g.appendChild(el("circle",{cx:m.x,cy:m.y,r:R,class:"mark"}));
    });
  });
  document.getElementById("count").textContent="표시한 곳: "+marks.length;
}

document.getElementById("undoBtn").addEventListener("click",()=>{marks.pop();render();});
document.getElementById("clearBtn").addEventListener("click",()=>{marks.length=0;render();});

build("front");build("back");render();
</script>
</body>
</html>
